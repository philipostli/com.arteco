<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Top Soil Line -->
  <rect x="15" y="55" width="70" height="6" fill="#000000" />

  <!-- Stem -->
  <line x1="50" y1="55" x2="50" y2="30" stroke="#000000" stroke-width="5" stroke-linecap="round" />

  <!-- Left leaf -->
  <path d="M50 45 C40 35 22 35 20 25 C30 22 46 30 50 42 Z" fill="#000000" />

  <!-- Right leaf -->
  <path d="M50 38 C60 28 78 28 80 18 C70 15 54 23 50 35 Z" fill="#000000" />

  <!-- Sprout tip -->
  <circle cx="50" cy="27" r="4" fill="#000000" />

  <!-- Soil particles below line -->
  <circle cx="28" cy="70" r="4" fill="#000000" />
  <polygon points="45,65 51,75 39,75" fill="#000000" />
  <circle cx="65" cy="72" r="4" fill="#000000" />
  <polygon points="72,65 78,73 66,73" fill="#000000" transform="rotate(20 72 69)" />
  <circle cx="38" cy="82" r="3" fill="#000000" />
  <circle cx="58" cy="84" r="3" fill="#000000" />
</svg>
